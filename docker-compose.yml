version: '3.8'
services:
  docker-builder:
    image: mattomeo15/docker-image-builder:latest
    container_name: docker-image-builder
    privileged: true
    ports:
      - "3000:3000"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Australia/Melbourne
      - DOCKER_HUB_USER=your_dockerhub_user_here
      - DOCKER_HUB_TOKEN=your_dockerhub_token_here
    volumes:
      - docker_builder_data:/app/workspace
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
volumes:
  docker_builder_data:
